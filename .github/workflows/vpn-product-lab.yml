name: Nostr VPN released product lab

on:
  push:
    paths:
      - .github/workflows/vpn-product-lab.yml
      - scripts/vpn-product-lab.sh
  pull_request:
    paths:
      - .github/workflows/vpn-product-lab.yml
      - scripts/vpn-product-lab.sh
  workflow_call:
    inputs:
      nvpn_rev:
        description: Exact public Nostr VPN commit
        required: false
        default: 4c43cc5761d67e5dc1a9a4de30c829ae45dc37f3
        type: string
      nvpn_git_url:
        description: Public Nostr VPN Git source
        required: false
        default: https://github.com/mmalmi/nostr-vpn.git
        type: string
  workflow_dispatch:
    inputs:
      nvpn_rev:
        description: Exact public Nostr VPN commit
        required: false
        default: 4c43cc5761d67e5dc1a9a4de30c829ae45dc37f3
        type: string
      nvpn_git_url:
        description: Public Nostr VPN Git source
        required: false
        default: https://github.com/mmalmi/nostr-vpn.git
        type: string

permissions:
  contents: read

jobs:
  nostr-vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IRIS_STACK_NVPN_REV: ${{ inputs.nvpn_rev || '4c43cc5761d67e5dc1a9a4de30c829ae45dc37f3' }}
      IRIS_STACK_NVPN_GIT_URL: ${{ inputs.nvpn_git_url || 'https://github.com/mmalmi/nostr-vpn.git' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run canonical two-process Nostr VPN gate
        run: scripts/vpn-product-lab.sh
