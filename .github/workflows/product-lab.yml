name: Released product lab

on:
  push:
    paths:
      - .github/workflows/product-lab.yml
      - Cargo.lock
      - Cargo.toml
      - scripts/product-lab.sh
      - src/bin/cashu-stack-fixture.rs
      - tests/cashu_payment_product.rs
      - tests/chat_drive_htree_product.rs
      - tests/drive_htree_product.rs
      - tests/support/**
  pull_request:
    paths:
      - .github/workflows/product-lab.yml
      - Cargo.lock
      - Cargo.toml
      - scripts/product-lab.sh
      - src/bin/cashu-stack-fixture.rs
      - tests/cashu_payment_product.rs
      - tests/chat_drive_htree_product.rs
      - tests/drive_htree_product.rs
      - tests/support/**
  workflow_call:
    inputs:
      drive_rev:
        description: Exact public Iris Drive commit
        required: false
        default: 97be0058df6c2a66dff9cb7303f172034e03420d
        type: string
      htree_version:
        description: Exact released hashtree-cli version
        required: false
        default: 0.2.100
        type: string
      chat_version:
        description: Exact released iris-chat crate version
        required: false
        default: 0.1.40
        type: string
  workflow_dispatch:
    inputs:
      drive_rev:
        description: Exact public Iris Drive commit
        required: false
        default: 97be0058df6c2a66dff9cb7303f172034e03420d
        type: string
      htree_version:
        description: Exact released hashtree-cli version
        required: false
        default: 0.2.100
        type: string
      chat_version:
        description: Exact released iris-chat crate version
        required: false
        default: 0.1.40
        type: string

permissions:
  contents: read

jobs:
  cashu-service-payment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install CDK protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
      - name: Run real Cashu failure and recovery gate
        run: cargo test --locked --test cashu_payment_product -- --nocapture

  chat-drive-hashtree:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IRIS_STACK_DRIVE_REV: ${{ inputs.drive_rev || '97be0058df6c2a66dff9cb7303f172034e03420d' }}
      IRIS_STACK_HTREE_VERSION: ${{ inputs.htree_version || '0.2.100' }}
      IRIS_STACK_CHAT_VERSION: ${{ inputs.chat_version || '0.1.40' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install CDK protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
      - name: Run released product process gate
        run: scripts/product-lab.sh
