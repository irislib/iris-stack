name: Native CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install CDK protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
      - name: Run native process and protocol tests
        run: cargo test --locked --all-targets
